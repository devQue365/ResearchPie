<!DOCTYPE html>
<html>
<head>
    <title>Always Listening Speech System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #111;
            color: white;
        }
        #status {
            font-size: 20px;
            margin-top: 20px;
        }
        .active {
            color: #00ff88;
        }
        .inactive {
            color: #ff4444;
        }
    </style>
</head>
<body>

<h1>Web Speech System</h1>
<div id="status" class="inactive">Listening: OFF</div>

<script>
let recognition;
let silenceTimer;
let finalTranscript = "";

function startRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = true;   // 🔥 Important
    recognition.lang = "en-US";

    recognition.onstart = () => {
        console.log("Listening...");
    };

    recognition.onresult = (event) => {
        clearTimeout(silenceTimer);

        let interimTranscript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            let transcript = event.results[i][0].transcript;

            if (event.results[i].isFinal) {
                finalTranscript += transcript + " ";
            } else {
                interimTranscript += transcript;
            }
        }

        // Restart silence timer on every speech detection
        silenceTimer = setTimeout(() => {
            if (finalTranscript.trim().length > 0) {
                console.log("Final sentence:", finalTranscript.trim());
                sendToPython(finalTranscript.trim());
                finalTranscript = "";
            }
        }, 1500); // 1.5 sec silence = sentence end
    };

    recognition.onerror = (event) => {
        console.error("Speech error:", event.error);
    };

    recognition.onend = () => {
        // Auto restart instantly
        setTimeout(() => {
            recognition.start();
        }, 200);
    };

    recognition.start();
}

function sendToPython(text) {
    fetch("/process", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    });
}

window.onload = () => {
    startRecognition();
};
</script>


</body>
</html>
